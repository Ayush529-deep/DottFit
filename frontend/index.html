<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App Title -->
    <title>DotFit | Wellness for the Modern World</title>

    <!-- Favicon (DotFit Logo) -->
    <link rel="icon" type="image/png" href="/public/logo.png" />

    <!-- SEO Meta -->
    <meta
      name="description"
      content="DotFit is a wellness and fitness platform designed for the modern world. Track workouts, improve health, and stay active every day."
    />
    <meta name="author" content="DotFit" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:title" content="DotFit | Wellness for the Modern World" />
    <meta
      property="og:description"
      content="Achieve your fitness and wellness goals with DotFit."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/dotfit-logo.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DotFit | Wellness for the Modern World" />
    <meta
      name="twitter:description"
      content="Your daily fitness and wellness companion."
    />
    <meta name="twitter:image" content="/dotfit-logo.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
